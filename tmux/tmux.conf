# ── Core ─────────────────────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# ── Status bar position ──────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# ── Color-coded session categories ───────────────────────────────────────────
# Session name drives the left badge color:
#   foreman-*  → magenta    (primary product)
#   work       → blue       (general dev)
#   company    → cyan       (company ops)
#   taxes/personal → yellow (personal)
#   ph0ny/webb → green      (webb projects)
#   default    → white
#
# This uses a chain of format conditionals to pick color by session name prefix.

SESSION_COLOR="#{?#{m:foreman*,#{session_name}},#[bg=colour133],"
SESSION_COLOR="${SESSION_COLOR}#{?#{m:work*,#{session_name}},#[bg=colour33],"
SESSION_COLOR="${SESSION_COLOR}#{?#{m:company*,#{session_name}},#[bg=colour37],"
SESSION_COLOR="${SESSION_COLOR}#{?#{m:tax*,#{session_name}},#[bg=colour178],"
SESSION_COLOR="${SESSION_COLOR}#{?#{m:ph0ny*,#{session_name}},#[bg=colour71],"
SESSION_COLOR="${SESSION_COLOR}#{?#{m:openclaw*,#{session_name}},#[bg=colour71],"
SESSION_COLOR="${SESSION_COLOR}#[bg=colour240]"
SESSION_COLOR="${SESSION_COLOR}}}}}}}"

# ── Status left: session badge ───────────────────────────────────────────────
set -g status-left-length 30
set -g status-left "#{?#{m:foreman*,#{session_name}},#[bg=colour133 fg=colour255 bold],#{?#{m:work*,#{session_name}},#[bg=colour33 fg=colour255 bold],#{?#{m:company*,#{session_name}},#[bg=colour37 fg=colour255 bold],#{?#{m:tax*,#{session_name}},#[bg=colour178 fg=colour16 bold],#{?#{m:ph0ny*,#{session_name}},#[bg=colour71 fg=colour255 bold],#{?#{m:openclaw*,#{session_name}},#[bg=colour71 fg=colour255 bold],#[bg=colour240 fg=colour255 bold]}}}}}} #S #[default] "

# ── Status right: minimal ────────────────────────────────────────────────────
set -g status-right-length 40
set -g status-right "#[fg=colour245]%H:%M"

# ── Status bar base style ────────────────────────────────────────────────────
set -g status-style "bg=colour235,fg=colour245"

# ── Window tabs: wider, padded, distinct ─────────────────────────────────────
# Inactive windows: dark bg, subtle text, generous padding
setw -g window-status-format "  #I:#W  "
setw -g window-status-style "bg=colour235,fg=colour245"

# Active window: bright, stands out clearly from Warp tabs
setw -g window-status-current-format "  #I:#W  "
setw -g window-status-current-style "bg=colour238,fg=colour255,bold"

# Separator between windows (adds visual spacing)
setw -g window-status-separator " "

# Bell/activity indicator
setw -g window-status-activity-style "bg=colour235,fg=colour208"
setw -g window-status-bell-style "bg=colour1,fg=colour255"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour245"

# ── Message styling ──────────────────────────────────────────────────────────
set -g message-style "bg=colour235,fg=colour255"
set -g message-command-style "bg=colour235,fg=colour255"

# ── Plugins (TPM) ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'drewstone/clipboard-bridge'

# TPM bootstrap — install with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run -b '~/.tmux/plugins/tpm/tpm'
